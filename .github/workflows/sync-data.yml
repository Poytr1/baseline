name: Sync Tennis Data

on:
  schedule:
    - cron: "0 6 * * *" # daily at 6am UTC
  workflow_dispatch: # manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx prisma generate

      # Step 1: Sackmann CSV baseline (historical data)
      - name: Sync Sackmann CSVs
        id: sync
        continue-on-error: true
        run: npm run sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Step 2: tennis-data.co.uk Excel (recent backfill, ~1 week lag)
      - name: Scrape tennis-data.co.uk
        id: scrape_atp
        continue-on-error: true
        run: npm run scrape-atp
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Step 3: TennisExplorer (near-real-time matches + rankings)
      - name: Scrape TennisExplorer
        id: scrape_te
        continue-on-error: true
        run: npm run scrape-te
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Step 4: Recompute Elo ratings
      - name: Compute Elo ratings
        id: compute_elo
        run: npm run compute-elo
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Step 5: Health check — fails the workflow if data is stale/broken
      - name: Health check
        run: npm run health-check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Step 6: Report which scrapers failed (even if health check passed)
      - name: Report scraper status
        if: always()
        run: |
          echo "## Scraper Status" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.sync.outcome }}" = "success" ]; then
            echo "- ✅ Sackmann CSV sync" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Sackmann CSV sync FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.scrape_atp.outcome }}" = "success" ]; then
            echo "- ✅ tennis-data.co.uk scrape" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ tennis-data.co.uk scrape FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.scrape_te.outcome }}" = "success" ]; then
            echo "- ✅ TennisExplorer scrape" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ TennisExplorer scrape FAILED" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.compute_elo.outcome }}" = "success" ]; then
            echo "- ✅ Elo computation" >> $GITHUB_STEP_SUMMARY
          else
            echo "- ❌ Elo computation FAILED" >> $GITHUB_STEP_SUMMARY
          fi

  # Notify on failure — creates a GitHub issue
  notify:
    runs-on: ubuntu-latest
    needs: sync
    if: failure()
    steps:
      - name: Create failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = `Data sync failed on ${new Date().toISOString().split('T')[0]}`;
            // Check if an open issue already exists
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'data-sync-failure',
              per_page: 1,
            });
            if (existing.data.length > 0) {
              // Comment on existing issue instead of creating a new one
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body: `Sync failed again on ${new Date().toISOString().split('T')[0]}.\n\n[Workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body: `The daily data sync pipeline failed.\n\nCheck the [workflow run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) for details.\n\nThis issue was created automatically.`,
                labels: ['data-sync-failure'],
              });
            }
